<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
  </defs>

  <rect width="800" height="340" rx="8" fill="url(#bg)"/>

  <!-- Tab bar -->
  <rect width="800" height="32" fill="#252526"/>
  <rect width="800" height="1" y="32" fill="#3c3c3c"/>
  <g font-family="-apple-system,sans-serif" font-size="12" fill="#969696">
    <text x="20" y="22">Requests</text>
    <text x="100" y="22">Elements</text>
    <text x="170" y="22">Timeline</text>
    <text x="240" y="22">Swaps</text>
    <text x="290" y="22" fill="#cccccc" font-weight="600">Errors</text>
    <!-- Error badge -->
    <rect x="324" y="10" width="20" height="16" rx="8" fill="#ef4444"/>
    <text x="334" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">10</text>
  </g>

  <!-- Search -->
  <rect y="33" width="800" height="28" fill="#252526"/>
  <rect x="8" y="38" width="200" height="18" rx="4" fill="#1e1e1e" stroke="#3c3c3c" stroke-width="0.5"/>
  <text x="16" y="51" font-family="-apple-system,sans-serif" font-size="11" fill="#6a6a6a">Filter errors...</text>
  <rect width="800" height="1" y="61" fill="#3c3c3c"/>

  <!-- Count -->
  <text x="12" y="78" font-family="-apple-system,sans-serif" font-size="10" fill="#6a6a6a">10 errors</text>
  <rect width="800" height="1" y="84" fill="#3c3c3c"/>

  <!-- Error group: Response Error -->
  <rect y="85" width="800" height="26" fill="#252526"/>
  <rect width="800" height="1" y="111" fill="#3c3c3c"/>
  <text x="12" y="103" font-family="-apple-system,sans-serif" font-size="12" fill="#ef4444" font-weight="600">Response Error</text>
  <rect x="120" y="92" width="16" height="16" rx="8" fill="#ef4444"/>
  <text x="128" y="104" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="600">5</text>

  <g font-family="'SF Mono','Fira Code',monospace" font-size="11">
    <rect y="112" width="800" height="24" fill="transparent"/>
    <text x="16" y="128" fill="#cccccc">Response Status Error Code 404 from /api/does-not-exist</text>
    <text x="620" y="128" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <text x="755" y="128" fill="#6a6a6a" font-size="9">req:d8ov0</text>
    <rect width="800" height="1" y="136" fill="#3c3c3c" opacity="0.5"/>

    <rect y="137" width="800" height="24" fill="transparent"/>
    <text x="16" y="153" fill="#cccccc">Response Status Error Code 404 from /api/does-not-exist</text>
    <text x="620" y="153" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <text x="755" y="153" fill="#6a6a6a" font-size="9">req:rrnb6</text>
    <rect width="800" height="1" y="161" fill="#3c3c3c" opacity="0.5"/>

    <rect y="162" width="800" height="24" fill="transparent"/>
    <text x="16" y="178" fill="#cccccc">Response Status Error Code 500 from /api/error-500</text>
    <text x="620" y="178" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <text x="755" y="178" fill="#6a6a6a" font-size="9">req:l1s5d</text>
    <rect width="800" height="1" y="186" fill="#3c3c3c" opacity="0.5"/>

    <rect y="187" width="800" height="24" fill="transparent"/>
    <text x="16" y="203" fill="#cccccc">Response Status Error Code 500 from /api/error-500</text>
    <text x="620" y="203" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <text x="755" y="203" fill="#6a6a6a" font-size="9">req:pvj24</text>
    <rect width="800" height="1" y="211" fill="#3c3c3c" opacity="0.5"/>
  </g>

  <!-- Error group: Target Not Found -->
  <rect y="218" width="800" height="26" fill="#252526"/>
  <rect width="800" height="1" y="244" fill="#3c3c3c"/>
  <text x="12" y="236" font-family="-apple-system,sans-serif" font-size="12" fill="#ef4444" font-weight="600">Target Not Found</text>
  <rect x="138" y="225" width="16" height="16" rx="8" fill="#ef4444"/>
  <text x="146" y="237" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="600">5</text>

  <g font-family="'SF Mono','Fira Code',monospace" font-size="11">
    <rect y="245" width="800" height="24" fill="transparent"/>
    <text x="16" y="261" fill="#cccccc">htmx:targetError</text>
    <text x="620" y="261" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <rect width="800" height="1" y="269" fill="#3c3c3c" opacity="0.5"/>

    <rect y="270" width="800" height="24" fill="transparent"/>
    <text x="16" y="286" fill="#cccccc">htmx:targetError</text>
    <text x="620" y="286" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
    <rect width="800" height="1" y="294" fill="#3c3c3c" opacity="0.5"/>

    <rect y="295" width="800" height="24" fill="transparent"/>
    <text x="16" y="311" fill="#cccccc">htmx:targetError</text>
    <text x="620" y="311" fill="#06b6d4" font-size="10">&lt;button.btn.danger&gt;</text>
  </g>

  <rect width="800" height="340" rx="8" fill="none" stroke="#3c3c3c" stroke-width="1"/>
</svg>
