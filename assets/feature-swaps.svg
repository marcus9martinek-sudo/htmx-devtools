<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
  </defs>

  <rect width="800" height="380" rx="8" fill="url(#bg)"/>

  <!-- Tab bar -->
  <rect width="800" height="32" fill="#252526"/>
  <rect width="800" height="1" y="32" fill="#3c3c3c"/>
  <g font-family="-apple-system,sans-serif" font-size="12" fill="#969696">
    <text x="20" y="22">Requests</text>
    <text x="100" y="22">Elements</text>
    <text x="170" y="22">Timeline</text>
    <text x="240" y="22" fill="#cccccc" font-weight="600">Swaps</text>
    <rect x="234" y="29" width="46" height="2" rx="1" fill="#3b82f6"/>
    <text x="290" y="22">Errors</text>
  </g>

  <!-- Toolbar -->
  <rect y="33" width="800" height="28" fill="#252526"/>
  <rect width="800" height="1" y="61" fill="#3c3c3c"/>
  <circle cx="22" cy="47" r="5" fill="#ef4444"/>
  <text x="36" y="51" font-family="-apple-system,sans-serif" font-size="11" fill="#6a6a6a">4 swaps</text>

  <!-- Split -->
  <rect x="320" y="62" width="1" height="318" fill="#3c3c3c"/>

  <!-- Swap list -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="11">
    <!-- Selected -->
    <rect y="62" width="320" height="28" fill="#094771"/>
    <rect x="8" y="68" width="66" height="14" rx="2" fill="#2d2d2d"/><text x="12" y="79" fill="#969696" font-size="9">INNERHTML</text>
    <text x="82" y="79" fill="#969696">/api/oob-swap</text>
    <rect x="272" y="68" width="30" height="14" rx="2" fill="#22c55e"/><text x="277" y="79" fill="#fff" font-size="9">GET</text>

    <rect y="90" width="320" height="28" fill="transparent"/>
    <rect x="8" y="96" width="66" height="14" rx="2" fill="#2d2d2d"/><text x="12" y="107" fill="#969696" font-size="9">INNERHTML</text>
    <text x="82" y="107" fill="#969696">/api/time</text>
    <rect x="272" y="96" width="30" height="14" rx="2" fill="#22c55e"/><text x="277" y="107" fill="#fff" font-size="9">GET</text>

    <rect y="118" width="320" height="28" fill="transparent"/>
    <rect x="8" y="124" width="66" height="14" rx="2" fill="#2d2d2d"/><text x="12" y="135" fill="#969696" font-size="9">INNERHTML</text>
    <text x="82" y="135" fill="#969696">/api/error-500</text>
    <rect x="272" y="124" width="30" height="14" rx="2" fill="#22c55e"/><text x="277" y="135" fill="#fff" font-size="9">GET</text>

    <rect y="146" width="320" height="28" fill="transparent"/>
    <rect x="8" y="152" width="66" height="14" rx="2" fill="#2d2d2d"/><text x="12" y="163" fill="#969696" font-size="9">OUTERHTML</text>
    <text x="82" y="163" fill="#969696">/api/swap-outer</text>
    <rect x="272" y="152" width="30" height="14" rx="2" fill="#22c55e"/><text x="277" y="163" fill="#fff" font-size="9">GET</text>
  </g>

  <!-- Detail: Diff view -->
  <g transform="translate(332, 62)">
    <!-- View mode tabs -->
    <rect width="456" height="28" fill="#252526"/>
    <rect width="456" height="1" y="28" fill="#3c3c3c"/>
    <g font-family="-apple-system,sans-serif" font-size="11">
      <text x="12" y="19" fill="#969696">Response</text>
      <text x="80" y="19" fill="#3b82f6" font-weight="700">Diff</text>
      <text x="110" y="19" fill="#969696">Before</text>
      <text x="160" y="19" fill="#969696">After</text>
      <text x="340" y="19" fill="#6a6a6a" font-size="10">innerHTML &#8594; #oob-main</text>
    </g>

    <!-- Diff content -->
    <g font-family="'SF Mono','Fira Code',monospace" font-size="11" transform="translate(0, 36)">
      <!-- Context line -->
      <text x="8" y="16" fill="#6a6a6a"> </text>
      <text x="24" y="16" fill="#cccccc">&lt;div id="oob-main" class="demo-result"&gt;</text>

      <!-- Removed line -->
      <rect y="22" width="456" height="18" fill="rgba(239,68,68,0.15)"/>
      <text x="8" y="36" fill="#ef4444">-</text>
      <text x="24" y="36" fill="#ef4444">&lt;div id="oob-main"&gt;Main updated at 10:54:20 AM&lt;/div&gt;</text>

      <!-- Added line -->
      <rect y="42" width="456" height="18" fill="rgba(34,197,94,0.15)"/>
      <text x="8" y="56" fill="#22c55e">+</text>
      <text x="24" y="56" fill="#22c55e">&lt;div id="oob-main"&gt;Main updated at 10:54:21 AM&lt;/div&gt;</text>

      <!-- Context -->
      <text x="8" y="78" fill="#6a6a6a"> </text>
      <text x="24" y="78" fill="#cccccc">&lt;/div&gt;</text>
    </g>
  </g>

  <rect width="800" height="380" rx="8" fill="none" stroke="#3c3c3c" stroke-width="1"/>
</svg>
