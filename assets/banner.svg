<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3366CC"/>
      <stop offset="100%" stop-color="#5b96d5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3366CC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5b96d5" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#5b96d5" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="180" rx="300" ry="150" fill="url(#glow)" filter="url(#blur1)"/>

  <!-- Left code snippets -->
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="13" opacity="0.25">
    <text x="60" y="100" fill="#e06c75">hx-get</text><text x="120" y="100" fill="#98c379">="/api/users"</text>
    <text x="40" y="130" fill="#e06c75">hx-target</text><text x="120" y="130" fill="#98c379">="#results"</text>
    <text x="80" y="160" fill="#e06c75">hx-swap</text><text x="140" y="160" fill="#98c379">="innerHTML"</text>
    <text x="50" y="190" fill="#e06c75">hx-trigger</text><text x="136" y="190" fill="#98c379">="click"</text>
    <text x="70" y="250" fill="#e06c75">hx-post</text><text x="130" y="250" fill="#98c379">="/api/submit"</text>
    <text x="30" y="280" fill="#e06c75">hx-confirm</text><text x="130" y="280" fill="#98c379">="Are you sure?"</text>
    <text x="60" y="310" fill="#e06c75">hx-boost</text><text x="130" y="310" fill="#98c379">="true"</text>
  </g>

  <!-- Right code snippets -->
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="13" opacity="0.25">
    <text x="920" y="100" fill="#e06c75">hx-delete</text><text x="1000" y="100" fill="#98c379">="/api/item/42"</text>
    <text x="940" y="130" fill="#e06c75">hx-swap</text><text x="1000" y="130" fill="#98c379">="outerHTML"</text>
    <text x="960" y="160" fill="#e06c75">hx-push-url</text><text x="1060" y="160" fill="#98c379">="true"</text>
    <text x="930" y="220" fill="#e06c75">hx-put</text><text x="980" y="220" fill="#98c379">="/api/contact/1"</text>
    <text x="950" y="250" fill="#e06c75">hx-target</text><text x="1030" y="250" fill="#98c379">="closest div"</text>
    <text x="920" y="280" fill="#e06c75">hx-select</text><text x="1000" y="280" fill="#98c379">="#content"</text>
    <text x="960" y="310" fill="#e06c75">hx-ext</text><text x="1010" y="310" fill="#98c379">="debug"</text>
  </g>

  <!-- Large decorative brackets -->
  <text x="160" y="340" font-family="'Cascadia Code',monospace" font-size="160" fill="#3366CC" opacity="0.06">&lt;/&gt;</text>
  <text x="850" y="340" font-family="'Cascadia Code',monospace" font-size="160" fill="#3366CC" opacity="0.06">{...}</text>

  <!-- Main title -->
  <text x="600" y="155" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="90" font-weight="bold" fill="white" letter-spacing="-2">HTMX</text>

  <!-- Subtitle -->
  <text x="600" y="210" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="38" fill="#8b949e">DevTools</text>

  <!-- Accent line -->
  <rect x="480" y="225" width="240" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline dots -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">
    <text x="600" y="265">Requests  ·  Elements  ·  Timeline  ·  Swaps  ·  Errors</text>
  </g>

  <!-- Badge -->
  <g transform="translate(530, 290)">
    <rect width="140" height="28" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="70" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">Browser Extension</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#accent)"/>
</svg>
