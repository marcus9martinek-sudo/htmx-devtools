<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="50%" stop-color="#162033"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3366CC"/>
      <stop offset="100%" stop-color="#5b96d5"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>
  <ellipse cx="600" cy="250" rx="400" ry="200" fill="#3366CC" opacity="0.06" filter="url(#glow)"/>
  <rect y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- NEW badge -->
  <g transform="translate(450, 50)">
    <rect width="300" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
    <rect width="300" height="36" rx="18" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <text x="150" y="24" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="#22c55e" letter-spacing="2">NOW WITH HTMX 4.0 ALPHA</text>
  </g>

  <!-- Icon + Title -->
  <g transform="translate(420, 110)">
    <rect width="80" height="80" rx="18" fill="#3366CC"/>
    <text x="40" y="58" text-anchor="middle" font-family="'Cascadia Code',monospace" font-size="36" font-weight="bold" fill="white">&lt;/&gt;</text>
  </g>
  <text x="520" y="155" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="bold" fill="white">HTMX DevTools</text>
  <text x="520" y="185" font-family="-apple-system,sans-serif" font-size="18" fill="#6b7b8d">v0.2.0 - Browser Extension</text>

  <rect x="100" y="215" width="1000" height="1" fill="#1e2d3d"/>

  <!-- Feature columns -->
  <g font-family="-apple-system,sans-serif" fill="#c9d1d9">
    <text x="150" y="255" font-size="14" font-weight="600" fill="#5b96d5">REQUEST INSPECTOR</text>
    <text x="150" y="280" font-size="13">Full lifecycle with timing breakdown</text>
    <text x="150" y="300" font-size="13">Headers, body, event correlation</text>
    <text x="150" y="320" font-size="13">Record / Pause / Clear controls</text>

    <text x="480" y="255" font-size="14" font-weight="600" fill="#5b96d5">ELEMENT INSPECTOR</text>
    <text x="480" y="280" font-size="13">Live DOM tree with auto-refresh</text>
    <text x="480" y="300" font-size="13">Hover highlight + element picker</text>
    <text x="480" y="320" font-size="13">Resolved targets + request history</text>

    <text x="810" y="255" font-size="14" font-weight="600" fill="#5b96d5">TIMELINE + SWAPS + ERRORS</text>
    <text x="810" y="280" font-size="13">Filterable event timeline</text>
    <text x="810" y="300" font-size="13">DOM diff visualizer (LCS)</text>
    <text x="810" y="320" font-size="13">Silent failure detection</text>
  </g>

  <rect x="100" y="345" width="1000" height="1" fill="#1e2d3d"/>

  <!-- Version comparison -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="13">
    <g transform="translate(200, 370)">
      <rect width="340" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <rect width="340" height="32" rx="8" fill="#1e2536"/>
      <rect y="24" width="340" height="8" fill="#1e2536"/>
      <rect x="12" y="10" width="60" height="16" rx="8" fill="#3b82f6"/>
      <text x="42" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">htmx 2.x</text>
      <text x="86" y="22" fill="#6b7b8d" font-size="11">XHR based</text>
      <text x="16" y="56" fill="#e06c75">htmx:configRequest</text>
      <text x="16" y="76" fill="#e06c75">htmx:beforeSwap</text>
      <text x="16" y="96" fill="#e06c75">htmx:responseError</text>
      <text x="16" y="116" fill="#6b7b8d">detail.xhr.status</text>
      <text x="240" y="56" fill="#98c379">&#x2713;</text>
      <text x="240" y="76" fill="#98c379">&#x2713;</text>
      <text x="240" y="96" fill="#98c379">&#x2713;</text>
      <text x="240" y="116" fill="#98c379">&#x2713;</text>
    </g>

    <g transform="translate(660, 370)">
      <rect width="340" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <rect width="340" height="32" rx="8" fill="#251e36"/>
      <rect y="24" width="340" height="8" fill="#251e36"/>
      <rect x="12" y="10" width="60" height="16" rx="8" fill="#7c3aed"/>
      <text x="42" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">htmx 4.0</text>
      <text x="86" y="22" fill="#6b7b8d" font-size="11">fetch() based</text>
      <text x="16" y="56" fill="#e06c75">htmx:config:request</text>
      <text x="16" y="76" fill="#e06c75">htmx:before:swap</text>
      <text x="16" y="96" fill="#e06c75">htmx:error (unified)</text>
      <text x="16" y="116" fill="#6b7b8d">detail.ctx.response</text>
      <text x="260" y="56" fill="#98c379">&#x2713;</text>
      <text x="260" y="76" fill="#98c379">&#x2713;</text>
      <text x="260" y="96" fill="#98c379">&#x2713;</text>
      <text x="260" y="116" fill="#98c379">&#x2713;</text>
    </g>
  </g>

  <!-- Bottom accent -->
  <rect y="557" width="1200" height="3" fill="url(#accent)"/>
</svg>
