<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="8" fill="url(#bg)"/>

  <!-- Tab bar -->
  <rect width="800" height="32" fill="#252526"/>
  <rect width="800" height="1" y="32" fill="#3c3c3c"/>
  <g font-family="-apple-system,sans-serif" font-size="12" fill="#969696">
    <text x="20" y="22">Requests</text>
    <text x="100" y="22" fill="#cccccc" font-weight="600">Elements</text>
    <rect x="92" y="29" width="68" height="2" rx="1" fill="#3b82f6"/>
    <text x="170" y="22">Timeline</text>
    <text x="240" y="22">Swaps</text>
    <text x="290" y="22">Errors</text>
    <text x="720" y="22" fill="#6a6a6a" font-size="11">htmx v2.0.4</text>
  </g>

  <!-- Toolbar -->
  <rect y="33" width="800" height="28" fill="#252526"/>
  <rect width="800" height="1" y="61" fill="#3c3c3c"/>
  <!-- Inspect icon -->
  <g transform="translate(10, 39)" stroke="#969696" stroke-width="1.2" fill="none">
    <rect x="2" y="2" width="4" height="4"/><rect x="12" y="2" width="4" height="4"/>
    <rect x="2" y="12" width="4" height="4"/><rect x="12" y="12" width="4" height="4"/>
    <path d="M7 5l-3 3m0 0V5m0 3h3" stroke-linecap="round"/>
  </g>
  <text x="34" y="51" font-family="-apple-system,sans-serif" font-size="11" fill="#6a6a6a">25 htmx elements</text>

  <!-- Split -->
  <rect x="380" y="62" width="1" height="438" fill="#3c3c3c"/>

  <!-- DOM Tree -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="11">
    <!-- Level 0 -->
    <text x="12" y="82" fill="#6a6a6a" font-size="9">&#x25BC;</text>
    <text x="24" y="82" fill="#6a6a6a">&lt;div</text><text x="50" y="82" fill="#f59e0b">.page-content</text><text x="126" y="82" fill="#6a6a6a">&gt;</text>

    <!-- Level 1 -->
    <text x="28" y="102" fill="#6a6a6a" font-size="9">&#x25BC;</text>
    <text x="40" y="102" fill="#6a6a6a">&lt;div</text><text x="66" y="102" fill="#f59e0b">.c</text><text x="76" y="102" fill="#6a6a6a">&gt;</text>

    <!-- Level 2 -->
    <text x="44" y="122" fill="#6a6a6a" font-size="9">&#x25BC;</text>
    <text x="56" y="122" fill="#6a6a6a">&lt;div</text><text x="82" y="122" fill="#f59e0b">.grid</text><text x="108" y="122" fill="#6a6a6a">&gt;</text>

    <!-- htmx elements (blue) -->
    <text x="76" y="144" fill="#06b6d4">&lt;button</text><text x="126" y="144" fill="#f59e0b">.btn.primary</text><text x="202" y="144" fill="#06b6d4">&gt;</text>
    <text x="220" y="144" fill="#6366f1" font-size="9">get target swap</text>

    <text x="76" y="164" fill="#06b6d4">&lt;button</text><text x="126" y="164" fill="#f59e0b">.btn.success</text><text x="202" y="164" fill="#06b6d4">&gt;</text>
    <text x="220" y="164" fill="#6366f1" font-size="9">post target include</text>

    <text x="76" y="184" fill="#06b6d4">&lt;button</text><text x="126" y="184" fill="#f59e0b">.btn.warning</text><text x="202" y="184" fill="#06b6d4">&gt;</text>
    <text x="220" y="184" fill="#6366f1" font-size="9">put target swap</text>

    <!-- Selected row -->
    <rect x="2" y="192" width="376" height="20" rx="2" fill="#094771"/>
    <text x="76" y="206" fill="#06b6d4">&lt;button</text><text x="126" y="206" fill="#f59e0b">.btn.danger</text><text x="196" y="206" fill="#06b6d4">&gt;</text>
    <text x="220" y="206" fill="#6366f1" font-size="9">delete target swap confirm</text>

    <text x="76" y="228" fill="#06b6d4">&lt;form</text><text x="106" y="228" fill="#06b6d4">&gt;</text>
    <text x="120" y="228" fill="#6366f1" font-size="9">post target</text>

    <text x="76" y="248" fill="#06b6d4">&lt;button</text><text x="126" y="248" fill="#f59e0b">.btn.outline</text><text x="202" y="248" fill="#06b6d4">&gt;</text>
    <text x="220" y="248" fill="#6366f1" font-size="9">get target swap</text>

    <!-- Collapsed section -->
    <text x="44" y="272" fill="#6a6a6a" font-size="9">&#x25B6;</text>
    <text x="56" y="272" fill="#6a6a6a">&lt;div</text><text x="82" y="272" fill="#f59e0b">.section</text><text x="122" y="272" fill="#6a6a6a">&gt;</text>

    <text x="60" y="292" fill="#6a6a6a" font-size="9">&#x25BC;</text>
    <text x="72" y="292" fill="#6a6a6a">&lt;div</text><text x="98" y="292" fill="#f59e0b">#contact-1</text><text x="158" y="292" fill="#6a6a6a">&gt;</text>

    <text x="88" y="312" fill="#06b6d4">&lt;div</text><text x="108" y="312" fill="#06b6d4">&gt;</text>
    <text x="120" y="312" fill="#6366f1" font-size="9">target swap</text>

    <text x="104" y="332" fill="#06b6d4">&lt;button</text><text x="154" y="332" fill="#f59e0b">.btn.primary</text><text x="230" y="332" fill="#06b6d4">&gt;</text>
    <text x="248" y="332" fill="#6366f1" font-size="9">get</text>

    <text x="60" y="356" fill="#6a6a6a" font-size="9">&#x25BC;</text>
    <text x="72" y="356" fill="#6a6a6a">&lt;div</text><text x="98" y="356" fill="#f59e0b">#todo-list</text><text x="154" y="356" fill="#6a6a6a">&gt;</text>

    <text x="88" y="376" fill="#06b6d4">&lt;input</text><text x="128" y="376" fill="#06b6d4">&gt;</text>
    <text x="142" y="376" fill="#6366f1" font-size="9">patch target swap</text>

    <text x="88" y="396" fill="#06b6d4">&lt;button</text><text x="138" y="396" fill="#f59e0b">.btn.danger</text><text x="208" y="396" fill="#06b6d4">&gt;</text>
    <text x="226" y="396" fill="#6366f1" font-size="9">delete target swap</text>
  </g>

  <!-- Detail panel -->
  <g transform="translate(392, 70)" font-family="-apple-system,sans-serif">
    <text y="10" font-size="10" fill="#6a6a6a" font-weight="600">ELEMENT</text>
    <rect y="18" width="396" height="48" rx="3" fill="#1e1e1e"/>
    <text x="8" y="36" font-size="10" font-family="'SF Mono',monospace" fill="#abb2bf">&lt;button class="btn danger"</text>
    <text x="8" y="52" font-size="10" font-family="'SF Mono',monospace" fill="#abb2bf">  hx-delete="/api/item/42" ...&gt;</text>

    <text y="88" font-size="10" fill="#6a6a6a" font-weight="600">HTMX ATTRIBUTES</text>
    <g font-size="11" font-family="'SF Mono',monospace">
      <text x="0" y="106" fill="#06b6d4">hx-delete</text><text x="120" y="106" fill="#cccccc">/api/item/42</text>
      <text x="0" y="122" fill="#06b6d4">hx-target</text><text x="120" y="122" fill="#cccccc">#delete-result</text>
      <text x="0" y="138" fill="#06b6d4">hx-swap</text><text x="120" y="138" fill="#cccccc">innerHTML</text>
      <text x="0" y="154" fill="#06b6d4">hx-confirm</text><text x="120" y="154" fill="#cccccc">Delete item?</text>
    </g>

    <text y="184" font-size="10" fill="#6a6a6a" font-weight="600">RESOLVED TARGETS</text>
    <g font-size="11" font-family="'SF Mono',monospace">
      <text x="0" y="202" fill="#06b6d4">hx-target</text><text x="120" y="202" fill="#06b6d4">&lt;div#delete-result&gt;</text>
    </g>

    <text y="232" font-size="10" fill="#6a6a6a" font-weight="600">INTERNAL DATA</text>
    <g font-size="11" font-family="'SF Mono',monospace">
      <text x="0" y="250" fill="#06b6d4">initHash</text><text x="120" y="250" fill="#cccccc">894392106</text>
      <text x="0" y="266" fill="#06b6d4">path</text><text x="120" y="266" fill="#cccccc">/api/item/42</text>
      <text x="0" y="282" fill="#06b6d4">verb</text><text x="120" y="282" fill="#cccccc">delete</text>
      <text x="0" y="298" fill="#06b6d4">firstInitCompleted</text><text x="160" y="298" fill="#cccccc">true</text>
    </g>
  </g>

  <rect width="800" height="500" rx="8" fill="none" stroke="#3c3c3c" stroke-width="1"/>
</svg>
